# method: oauth uses Google Application Default Credentials (ADC) — e.g. GCE/Cloud Run
# or `gcloud auth application-default login` for local dev.
liverpool:
  target: prod
  outputs:
    prod:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT') }}"
      dataset: liverpool_analytics
      location: EU
      threads: 4
      timeout_seconds: 300
