name: Deploy
on:
  push:
    branches: [main]

env:
  REGISTRY: europe-west1-docker.pkg.dev/liverpool-analytics/liverpool

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/368856641338/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-sa@liverpool-analytics.iam.gserviceaccount.com

      - run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build & push backend
        run: |
          docker build -t $REGISTRY/backend:$GITHUB_SHA -t $REGISTRY/backend:latest ./backend
          docker push $REGISTRY/backend:$GITHUB_SHA
          docker push $REGISTRY/backend:latest

      - name: Build & push frontend
        run: |
          docker build \
            --build-arg VITE_SEASON=${{ secrets.CURRENT_SEASON || '2526' }} \
            -t $REGISTRY/frontend:$GITHUB_SHA \
            -t $REGISTRY/frontend:latest \
            ./frontend
          docker push $REGISTRY/frontend:$GITHUB_SHA
          docker push $REGISTRY/frontend:latest

      - name: Build & push scraper
        run: |
          docker build -t $REGISTRY/scraper:$GITHUB_SHA -t $REGISTRY/scraper:latest ./scraper
          docker push $REGISTRY/scraper:$GITHUB_SHA
          docker push $REGISTRY/scraper:latest

      - name: Build & push dbt
        run: |
          docker build -t $REGISTRY/dbt:$GITHUB_SHA -t $REGISTRY/dbt:latest ./dbt
          docker push $REGISTRY/dbt:$GITHUB_SHA
          docker push $REGISTRY/dbt:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: deploy
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/liverpool-analytics
            cat > .env << 'ENVEOF'
            GCP_PROJECT=${{ secrets.GCP_PROJECT }}
            REGISTRY=europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/liverpool
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            DOMAIN=${{ secrets.DOMAIN }}
            FRONTEND_URL=https://${{ secrets.DOMAIN }}
            CURRENT_SEASON=${{ secrets.CURRENT_SEASON }}
            VITE_SEASON=${{ secrets.CURRENT_SEASON }}
            AIRFLOW_SECRET=${{ secrets.AIRFLOW_SECRET }}
            ENVEOF
            gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet
            docker compose pull backend frontend
            docker compose up -d backend frontend nginx airflow
            docker image prune -f