name: Deploy
on:
  push:
    branches: [main]

env:
  REGISTRY: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/liverpool

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build & push backend
        run: |
          docker build -t $REGISTRY/backend:$GITHUB_SHA -t $REGISTRY/backend:latest ./backend
          docker push $REGISTRY/backend:$GITHUB_SHA
          docker push $REGISTRY/backend:latest

      - name: Build & push frontend
        run: |
          S='${{ secrets.CURRENT_SEASON }}'
          [ -n "$S" ] || S=2425
          docker build --build-arg "VITE_SEASON=$S" -t $REGISTRY/frontend:$GITHUB_SHA -t $REGISTRY/frontend:latest ./frontend
          docker push $REGISTRY/frontend:$GITHUB_SHA
          docker push $REGISTRY/frontend:latest

      - name: Build & push scraper
        run: |
          docker build -t $REGISTRY/scraper:$GITHUB_SHA -t $REGISTRY/scraper:latest ./scraper
          docker push $REGISTRY/scraper:$GITHUB_SHA
          docker push $REGISTRY/scraper:latest

      - name: Build & push dbt
        run: |
          docker build -t $REGISTRY/dbt:$GITHUB_SHA -t $REGISTRY/dbt:latest ./dbt
          docker push $REGISTRY/dbt:$GITHUB_SHA
          docker push $REGISTRY/dbt:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: deploy
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/liverpool-analytics
            echo "REGISTRY=europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/liverpool" > .env
            echo "GCP_PROJECT=${{ secrets.GCP_PROJECT }}" >> .env
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
            echo "DOMAIN=${{ secrets.DOMAIN }}" >> .env
            echo "AIRFLOW_SECRET=${{ secrets.AIRFLOW_SECRET }}" >> .env
            SEAS='${{ secrets.CURRENT_SEASON }}'
            if [ -z "$SEAS" ]; then SEAS=2425; fi
            echo "CURRENT_SEASON=$SEAS" >> .env
            gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet
            docker compose pull backend frontend scraper
            docker compose up -d backend frontend nginx airflow
            docker image prune -f
